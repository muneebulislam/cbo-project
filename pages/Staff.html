<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="css/styles.css">
    <link rel="stylesheet" type="text/css" href="css/staff.css">
    <title>Staff page</title>
</head>

<body>
    <nav>
        <div class="topnav">
            <a class="active" href="http://localhost:8080/Landing.html">Landing</a>
            <a href="http://localhost:8080/Customers.html">Customers</a>
            <a class="active" href="http://localhost:8080/Staff.html">Staff</a>
        </div>
    </nav>
    <main class="main">
        <div class="inputs">
            <label>Name:</label>
            <input type="text" id="name-input" placeholder="Enter employee name">
            <label>Email:</label>
            <input type="text" placeholder="Enter email" id="email-input" name="email-input">
            <label>Employee Id:</label>
            <input type="text" placeholder="Enter Employee id" id="id-input" name="id-input">
            <button type="button" id="submit">Submit</button>

            <input type="text" placeholder="search by name" id="search-input">
            <button type="button" id="search-btn">Search</button>
        </div>
        <table id="table">
            <thead>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Employee id</th>
                <th>First Employed</th>
                <th>Delete</th>
                <th>Edit</th>
            </thead>
            <tbody id="tbody"></tbody>
        </table>

        <section hidden="true" id="update-row">
            <label>Enter New Email:</label>
            <input type="text" id="update-email-input">
            <button type="button" id="update-btn">Update</button>
        </section>
    </main>
    <script src="javascripts/staff.js"></script>
</body>

</html>
